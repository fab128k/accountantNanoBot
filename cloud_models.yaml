# cloud_models.yaml
# Configurazione modelli Cloud per DeepAiUG
# ============================================================================
# Questo file permette di configurare i provider cloud e i modelli disponibili
# senza modificare il codice sorgente. Segue lo stesso pattern di remote_servers.yaml.
# ============================================================================

settings:
  # true = utente può digitare modello non in lista ("✏️ Altro...")
  # false = solo modelli dalla lista
  allow_custom_models: true

providers:
  openai:
    name: "OpenAI"
    icon: "🟢"
    base_url: "https://api.openai.com/v1"
    models:
      - id: "gpt-4o"
        name: "GPT-4o"
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
      - id: "o3-mini"
        name: "o3-mini"
    default_model: "gpt-4o-mini"

  anthropic:
    name: "Anthropic (Claude)"
    icon: "🟣"
    base_url: "https://api.anthropic.com/v1"
    models:
      - id: "claude-sonnet-4-5-20250929"
        name: "Claude Sonnet 4.5"
      - id: "claude-haiku-4-5-20251001"
        name: "Claude Haiku 4.5"
    default_model: "claude-sonnet-4-5-20250929"

  google:
    name: "Google Gemini"
    icon: "🔵"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    models:
      - id: "gemini-2.0-flash"
        name: "Gemini 2.0 Flash"
      - id: "gemini-2.5-pro-preview-06-05"
        name: "Gemini 2.5 Pro"
    default_model: "gemini-2.0-flash"

  custom:
    name: "Custom"
    icon: "⚙️"
    base_url: ""
    models: []
    default_model: ""
